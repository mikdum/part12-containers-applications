services:
  app:
    image: hello-front-dev
    build:
      context: .
      dockerfile: dev.Dockerfile
    volumes:
    - ./:/usr/src/app
    ports:
    - 3210:5173
    environment:
    - VITE_BACKEND_URL=http://localhost:3000
    container_name: hello-front-dev
  
  nginx:
    image: nginx:1.29
    volumes:
    - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
    - 8080:80
    container_name: reverse-proxy
    depends_on:
    - app
  
  debug-helper:
    image: busybox